name: Sync sorteos a Render

on:
  schedule:
    # Cada 5 min — cubre ventana post-sorteo (12/15/18/21 hs Argentina)
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: sync-render
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Dependencias
        run: pip install -r requirements.txt

      - name: Scrapear y empujar a Render
        env:
          RENDER_URL: https://quiniela-predictor-xxbq.onrender.com
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          SYNC_DAYS: "30"
        run: python scripts/sync_render_ci.py
